name: build

# Publicly build + publish the custom chat image, then surface its digest in the
# README. Anyone can read this run's logs to verify the image was built from this
# exact source — the same digest the app displays in its footer at runtime.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "attestor/**"
      - ".github/workflows/build.yml"
      - "scripts/update-readme-digest.sh"
  workflow_dispatch:

permissions:
  contents: write # commit the README digest update
  packages: write # push to GHCR

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: img
        run: echo "ref=${IMAGE,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build timestamp
        id: meta
        run: echo "built=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ steps.img.outputs.ref }}:latest
            ${{ steps.img.outputs.ref }}:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.meta.outputs.built }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push attestor sidecar
        uses: docker/build-push-action@v6
        with:
          context: ./attestor
          push: true
          tags: |
            ${{ steps.img.outputs.ref }}-attestor:latest
            ${{ steps.img.outputs.ref }}-attestor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update README with the new image digest
        run: |
          scripts/update-readme-digest.sh \
            "${{ steps.build.outputs.digest }}" \
            "${{ github.sha }}" \
            "${{ steps.meta.outputs.built }}" \
            "${{ steps.img.outputs.ref }}"

      - name: Commit README if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "README digest unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update deployed image digest [skip ci]"
          git push
